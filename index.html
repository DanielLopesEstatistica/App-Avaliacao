<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avaliação Diária</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:500px;
    margin:auto;
    padding:20px;
}

input,button{
    width:100%;
    padding:12px;
    margin:6px 0;
    box-sizing:border-box;
}

.estrelas button{
    width:auto;
    font-size:40px;
    margin:5px;
}

.msg{
    border:1px solid #ccc;
    padding:10px;
    margin:10px 0;
}

.rating {
  display: inline-flex;
  font-size: 60px;
  cursor: pointer;
  user-select: none;
}

.rating span {
  position: relative;
  color: #444;
}

.rating span.full {
  color: gold;
}

.rating span.half {
  color: #444;
}

.rating span.half::before {
  content: "★";
  position: absolute;
  left: 0;
  top: 0;
  width: 50%;
  overflow: hidden;
  color: gold;
}
</style>
</head>
<body>

<div id="cadastro">

<h2>Primeiro acesso</h2>

<input id="nome" placeholder="Seu nome">

<input id="grupo" placeholder="Código do casal">

<button onclick="salvarCadastro()">
Salvar
</button>

</div>

<div id="app" style="display:none">

<h2 id="titulo"></h2>

<p>Como foi hoje?</p>

<div id="rating" class="rating">
  <span data-star="1">★</span>
  <span data-star="2">★</span>
  <span data-star="3">★</span>
  <span data-star="4">★</span>
  <span data-star="5">★</span>
</div>

<p id="notaTexto">Nenhuma avaliação</p>

<button onclick="enviarAvaliacao()">
Enviar
</button>

<hr>

<h3>Recebidas</h3>

<div id="mensagens"></div>

</div>

<script>

let notaSelecionada = 0;
let hoverAtual = 0;

const rating = document.getElementById("rating");

rating.querySelectorAll("span").forEach(star => {

  star.addEventListener("mousemove", e => {

    const rect = star.getBoundingClientRect();

    const metade =
      (e.clientX - rect.left) < rect.width / 2;

    const valor =
      Number(star.dataset.star) - (metade ? 0.5 : 0);

    hoverAtual = valor;

    desenhar(valor);

  });

  star.addEventListener("click", e => {

    const rect = star.getBoundingClientRect();

    const metade =
      (e.clientX - rect.left) < rect.width / 2;

    notaSelecionada =
      Number(star.dataset.star) - (metade ? 0.5 : 0);

    desenhar(notaSelecionada);

    document.getElementById("notaTexto").innerText =
      notaSelecionada.toFixed(1) + " estrelas";

  });

});

rating.addEventListener("mouseleave", () => {
  desenhar(notaSelecionada);
});

function desenhar(valor){

  rating.querySelectorAll("span").forEach(star => {

    const n = Number(star.dataset.star);

    star.classList.remove("full");
    star.classList.remove("half");

    if (valor >= n) {
      star.classList.add("full");
    }
    else if (valor >= n - 0.5) {
      star.classList.add("half");
    }

  });

}

function avaliar(nota){

  fetch(URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      grupo: localStorage.getItem("grupo"),
      remetente: localStorage.getItem("nome"),
      nota: nota
    })
  })
  .then(r => r.json())
  .then(() => {

    alert("Avaliação enviada!");

  })
  .catch(() => {

    alert("Erro ao enviar avaliação.");

  });

}

function enviarAvaliacao(){

  if(notaSelecionada === 0){
    alert("Escolha uma nota");
    return;
  }

  avaliar(notaSelecionada);

}

const URL = "https://twilight-grass-fffb.d236081.workers.dev/";

function iniciar(){

    const nome = localStorage.getItem("nome");
    const grupo = localStorage.getItem("grupo");

    if(!nome || !grupo){
        document.getElementById("cadastro").style.display="block";
        document.getElementById("app").style.display="none";
        return;
    }

    document.getElementById("cadastro").style.display="none";
    document.getElementById("app").style.display="block";

    document.getElementById("titulo").innerText =
        "Olá, " + nome;

    buscarMensagens();

    setInterval(
        buscarMensagens,
        30000
    );
}

function salvarCadastro(){

    localStorage.setItem(
        "nome",
        document.getElementById("nome").value
    );

    localStorage.setItem(
        "grupo",
        document.getElementById("grupo").value
    );

    iniciar();
}

function buscarMensagens(){

  const grupo = localStorage.getItem("grupo");
  const usuario = localStorage.getItem("nome");

  fetch(
    URL +
    "?grupo=" + encodeURIComponent(grupo) +
    "&usuario=" + encodeURIComponent(usuario)
  )
  .then(r => r.json())
  .then(dados => {

    const divMsg = document.getElementById("mensagens");

    dados.forEach(msg => {

      const el = document.createElement("div");
      el.className = "msg";

      el.innerHTML =
        "<b>" + msg.remetente + "</b><br>" +
        msg.nota + " estrela(s)";

      divMsg.prepend(el);

      if ("Notification" in window && Notification.permission === "granted") {
        new Notification("Nova avaliação", {
          body: msg.remetente + " enviou " + msg.nota + " estrela(s)"
        });
      }

    });

  })
  .catch(err => {
    console.error("Erro ao buscar mensagens:", err);
  });

}

iniciar();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
